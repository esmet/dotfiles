unbind C-b
set -g prefix C-a

# Intentionally do NOT set default-terminal or terminal-overrides.
# Tested 2026-04-27: setting default-terminal "tmux-256color" caused
# claude (Ink-based TUI) to render with no colors, even though the
# tmux-256color terminfo entry is present on this macOS box. Letting
# tmux fall back to its built-in default ("screen") restores colors
# end-to-end. The terminal-overrides line is paired with it and only
# meaningful when the inner TERM matches the patterns, so it goes
# too.

set-option -g default-shell /bin/bash

# Drop tmux's 500ms escape-key delay. With the default, every ESC-
# prefixed sequence (arrows, function keys, claude's Ctrl-* combos)
# takes half a second to register. -s puts it on the server, -g for
# safety on older tmux that read it as a session option.
set -sg escape-time 0

# Tell tmux about focus events so editors and TUIs (claude included)
# can react to focus loss/gain in the browser-attached pane.
set-option -g focus-events on
bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"
bind -n End send-key C-e
bind -n Home send-key C-a

# urxvt tab like window switching (-n: no prior escape seq)
bind -n S-left prev
bind -n S-right next

# window index fix
set -g base-index 1

# pane movements
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R
set-window-option -g mode-keys vi

# status bar
set -g status-bg black
set -g status-fg yellow
set -g status-interval 1

set -g status-left ' '
set -g status-right '#[fg=yellow]%Y-%m-%d %H:%M#[default] '

set-window-option -g clock-mode-style 12

# Use the current path by default when splitting windows
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
